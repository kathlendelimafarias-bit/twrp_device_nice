name: Compilar TWRP Moto G86

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar Ambiente Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y gperf gcc-multilib g++-multilib libc6-dev libncurses5-dev libncursesw5-dev libx11-dev zlib1g-dev libxml2-utils xsltproc unzip bc bison build-essential ccache curl flex g++ rsync libssl-dev python3

    - name: Maximizar Espaço em Disco
      uses: easimon/maximize-build-space@v8
      with:
        root-reserve-mb: 1024
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'

    - name: Baixar Ferramenta e Inicializar Manifesto (Tudo Junto)
      run: |
        # Instala o utilitário do sistema
        sudo apt-get update && sudo apt-get install -y repo
        
        # Cria a pasta de trabalho zerada
        mkdir -p twrp
        cd twrp
        
        # Inicializa um repositório Git local limpo para ignorar as regras globais da máquina
        git init
        git config --local user.name "kathlendelimafarias-bit"
        git config --global user.name "kathlendelimafarias-bit"
        git config --local user.email "kathlendelimafarias@gmail.com"
        git config --global user.email "kathlendelimafarias@gmail.com"
        
        # Sobrescreve agressivamente qualquer bloqueio forçando o HTTPS puro localmente
        git config --local url."https://github.com".insteadOf "git@github.com:"
        git config --local url."https://github.com".insteadOf "https://github.com"
        
        # Inicializa o manifesto usando a flag de bypass de clonagem para o terminal não se perder
        repo init --depth=1 --no-repo-verify --repo-url=https://github.comGerritCodeReview/git-repo -u "https://github.comminimal-manifest-twrp/platform_manifest_twrp_aosp.git" -b twrp-14.0


    - name: Sincronizar Arquivos do Android 14 (Download Longo)
      run: |
        cd twrp
        ~/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clonar a Sua Device Tree
      uses: actions/checkout@v4
      with:
        path: twrp/device/motorola/nice

    - name: Executar a Compilação (Build)
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_nice-eng
        mka recoveryimage -j$(nproc --all)

    - name: Salvar o Arquivo .IMG Pronto
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-MotoG86-Nice
        path: twrp/out/target/product/nice/*.img
