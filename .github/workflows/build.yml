name: Compilar TWRP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Baixar os arquivos do próprio repositório
      uses: actions/checkout@v4

    - name: Configurar Ambiente Linux e Instalar Repo Oficial
      run: |
        sudo apt-get update
        # Adicionado o pacote 'repo' oficial do gerenciador do Ubuntu
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip repo

    - name: Configurar Git Global
      run: |
        git config --global user.name "lemki_25"
        git config --global user.email "kathlendelimafarias-bit"

    - name: Inicializar Manifesto do TWRP
      run: |
        mkdir -p ../twrp_base
        cd ../twrp_base
        repo init --depth=1 -u https://github.com -b twrp-12.1

    - name: Sincronizar Código-Fonte (Download Pesado)
      run: |
        cd ../twrp_base
        repo sync -j$(nproc) --force-sync --no-clone-bundle --no-tags

    - name: Mover Árvore de Dispositivos para o Local Correto
      run: |
        mkdir -p ../twrp_base/device/motorola/nice
        rsync -arv --exclude='.github' --exclude='.git' ./ ../twrp_base/device/motorola/nice/

    - name: Executar a Compilação (.img)
      run: |
        cd ../twrp_base
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch twrp_nice-eng 
        make recoveryimage -j$(nproc)

    - name: Salvar o arquivo .img gerado
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Nice-Final
        path: ../twrp_base/out/target/product/nice/recovery.img
